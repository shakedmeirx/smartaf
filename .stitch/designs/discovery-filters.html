<!DOCTYPE html>

<html class="light" dir="rtl" lang="he"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#7C3AED",
              "on-primary": "#FFFFFF",
              "surface": "#F9FAFB",
              "on-surface": "#111827",
              "surface-variant": "#F3F4F6",
              "on-surface-variant": "#4B5563",
              "outline": "#D1D5DB",
              "primary-container": "#F5F3FF",
              "on-primary-container": "#5B21B6",
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans", "sans-serif"],
              "body": ["Plus Jakarta Sans", "sans-serif"],
            },
            borderRadius: {
              "DEFAULT": "1rem",
              "lg": "1.5rem",
              "xl": "2.5rem",
              "full": "9999px"
            },
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Specific refinement for the elegant Lullaby & Slate look */
        .glass-header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
        }
        .soft-shadow {
            box-shadow: 0 4px 20px -4px rgba(0, 0, 0, 0.05);
        }
        .active-shadow {
            box-shadow: 0 8px 25px -5px rgba(124, 58, 237, 0.25);
        }
    </style>
</head>
<body class="bg-slate-900/40 font-body text-on-surface antialiased overflow-hidden">
<!-- Screen Wrapper / Modal Backdrop Overlay -->
<div class="fixed inset-0 z-0"></div>
<!-- Main Discovery Filter Bottom Sheet Canvas -->
<main class="relative min-h-screen flex flex-col justify-end max-w-md mx-auto">
<!-- Bottom Sheet Content -->
<div class="bg-white rounded-t-xl h-[90dvh] flex flex-col relative overflow-hidden shadow-2xl">
<!-- Handle indicator for visual cue -->
<div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mt-3 mb-1"></div>
<!-- TopAppBar -->
<header class="glass-header top-0 sticky z-50 flex flex-row-reverse justify-between items-center w-full px-6 py-4">
<button class="w-10 h-10 flex items-center justify-center text-on-surface-variant hover:bg-surface-variant transition-colors rounded-full">
<span class="material-symbols-outlined text-[22px]" data-icon="close">close</span>
</button>
<h1 class="text-lg font-bold text-on-surface font-headline tracking-tight">סינון תוצאות</h1>
<button class="text-primary font-headline font-semibold text-sm px-3 py-1 hover:bg-primary-container rounded-full transition-colors">
                    איפוס
                </button>
</header>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto no-scrollbar px-6 pb-40 space-y-9 pt-6">
<!-- Search Section -->
<section class="space-y-4">
<label class="text-on-surface-variant font-headline font-bold text-[13px] uppercase tracking-wider px-1">מיקום</label>
<div class="relative">
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/60" data-icon="search">search</span>
<input class="w-full bg-surface-variant border-none rounded-full py-4 pr-12 pl-5 text-on-surface focus:ring-2 focus:ring-primary/20 transition-all duration-300 outline-none placeholder:text-on-surface-variant/50 text-sm" placeholder="איזו עיר או שכונה?" type="text"/>
</div>
</section>
<!-- Price Range Section -->
<section class="space-y-6">
<div class="flex justify-between items-baseline px-1">
<label class="text-on-surface-variant font-headline font-bold text-[13px] uppercase tracking-wider">טווח מחירים לשעה</label>
<span class="text-primary font-bold text-base">₪45 - ₪120</span>
</div>
<div class="px-2 py-4">
<div class="h-1.5 w-full bg-slate-100 rounded-full relative">
<div class="absolute inset-y-0 right-[20%] left-[35%] bg-primary rounded-full"></div>
<div class="absolute top-1/2 -translate-y-1/2 right-[20%] w-7 h-7 bg-white border border-slate-200 rounded-full shadow-md cursor-pointer flex items-center justify-center">
<div class="w-2.5 h-2.5 bg-primary rounded-full"></div>
</div>
<div class="absolute top-1/2 -translate-y-1/2 left-[35%] w-7 h-7 bg-white border border-slate-200 rounded-full shadow-md cursor-pointer flex items-center justify-center">
<div class="w-2.5 h-2.5 bg-primary rounded-full"></div>
</div>
</div>
</div>
</section>
<!-- Availability Section -->
<section class="space-y-4">
<label class="text-on-surface-variant font-headline font-bold text-[13px] uppercase tracking-wider px-1">זמן ביום</label>
<div class="grid grid-cols-3 gap-3">
<button class="flex flex-col items-center gap-2 p-4 rounded-xl bg-white border border-slate-100 soft-shadow transition-all active:scale-95">
<span class="material-symbols-outlined text-primary text-[20px]" data-icon="light_mode">light_mode</span>
<span class="text-xs font-bold text-on-surface">בוקר</span>
</button>
<button class="flex flex-col items-center gap-2 p-4 rounded-xl bg-primary text-on-primary active-shadow transition-all active:scale-95">
<span class="material-symbols-outlined text-[20px]" data-icon="wb_twilight">wb_twilight</span>
<span class="text-xs font-bold">אחה״צ</span>
</button>
<button class="flex flex-col items-center gap-2 p-4 rounded-xl bg-white border border-slate-100 soft-shadow transition-all active:scale-95">
<span class="material-symbols-outlined text-primary text-[20px]" data-icon="dark_mode">dark_mode</span>
<span class="text-xs font-bold text-on-surface">ערב</span>
</button>
</div>
</section>
<!-- Specialties Section -->
<section class="space-y-4">
<label class="text-on-surface-variant font-headline font-bold text-[13px] uppercase tracking-wider px-1">כישורים והתמחויות</label>
<div class="flex flex-wrap gap-2.5">
<div class="bg-white border border-slate-100 px-4 py-2.5 rounded-full flex items-center gap-2 cursor-pointer soft-shadow hover:bg-surface-variant transition-colors group">
<span class="material-symbols-outlined text-[18px] text-primary" data-icon="medical_services">medical_services</span>
<span class="text-[13px] font-semibold text-on-surface-variant">עזרה ראשונה</span>
</div>
<div class="bg-primary-container text-on-primary-container px-4 py-2.5 rounded-full flex items-center gap-2 cursor-pointer">
<span class="material-symbols-outlined text-[18px]" data-icon="child_care">child_care</span>
<span class="text-[13px] font-bold">טיפול בתינוקות</span>
</div>
<div class="bg-white border border-slate-100 px-4 py-2.5 rounded-full flex items-center gap-2 cursor-pointer soft-shadow hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-[18px] text-primary" data-icon="restaurant">restaurant</span>
<span class="text-[13px] font-semibold text-on-surface-variant">בישול</span>
</div>
<div class="bg-white border border-slate-100 px-4 py-2.5 rounded-full flex items-center gap-2 cursor-pointer soft-shadow hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined text-[18px] text-primary" data-icon="directions_car">directions_car</span>
<span class="text-[13px] font-semibold text-on-surface-variant">רישיון נהיגה</span>
</div>
</div>
</section>
<!-- Distance Section -->
<section class="space-y-5">
<div class="flex justify-between items-baseline px-1">
<label class="text-on-surface-variant font-headline font-bold text-[13px] uppercase tracking-wider">מרחק מקסימלי</label>
<span class="text-on-surface font-bold text-sm">5 ק״מ</span>
</div>
<div class="px-2">
<div class="h-1.5 w-full bg-slate-100 rounded-full relative">
<div class="h-full w-[40%] bg-primary/40 rounded-full"></div>
<div class="absolute left-[60%] -translate-x-1/2 top-1/2 -translate-y-1/2 w-6 h-6 bg-white border border-slate-200 rounded-full shadow-sm"></div>
</div>
</div>
</section>
<!-- Info Card -->
<div class="p-5 bg-primary-container/50 border border-primary/5 rounded-2xl flex items-center gap-4">
<div class="bg-white p-3 rounded-xl shadow-sm text-primary flex-shrink-0">
<span class="material-symbols-outlined" data-icon="verified" style="font-variation-settings: 'FILL' 1;">verified</span>
</div>
<div class="space-y-1">
<h4 class="text-sm font-bold text-on-primary-container">מטפלות מאומתות בלבד</h4>
<p class="text-xs text-on-primary-container/70 leading-relaxed">הצגת מטפלות שעברו אימות זהות וראיון אישי בלבד לביטחון מקסימלי.</p>
</div>
</div>
</div>
<!-- Footer Action -->
<footer class="p-6 pb-8 bg-white/80 backdrop-blur-md absolute bottom-0 left-0 right-0 z-20 border-t border-slate-100">
<button class="w-full bg-primary text-on-primary py-4.5 rounded-full font-headline font-bold text-base active-shadow active:scale-[0.98] transition-all flex items-center justify-center gap-3">
<span>הצגת תוצאות</span>
<span class="material-symbols-outlined text-[20px]" data-icon="arrow_back">arrow_back</span>
</button>
</footer>
</div>
</main>
</body></html>
