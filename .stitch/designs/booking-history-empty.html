<!DOCTYPE html>

<html dir="rtl" lang="he"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-tertiary-container": "#64042d",
              "primary-container": "#b28cff",
              "on-background": "#242f41",
              "surface-container-high": "#d5e3ff",
              "primary-dim": "#6411d5",
              "inverse-surface": "#040e1f",
              "surface-bright": "#f4f6ff",
              "secondary": "#60586b",
              "inverse-on-surface": "#929db4",
              "outline-variant": "#a2adc4",
              "on-primary-container": "#2e006c",
              "outline": "#6c778c",
              "primary-fixed": "#b28cff",
              "tertiary-fixed-dim": "#f77c9e",
              "secondary-fixed-dim": "#dbd0e7",
              "surface-variant": "#cdddfe",
              "surface-tint": "#702ae1",
              "secondary-fixed": "#e9def5",
              "secondary-container": "#e9def5",
              "surface-container-low": "#ecf1ff",
              "error-dim": "#a70138",
              "tertiary": "#9e3657",
              "tertiary-fixed": "#ff8eac",
              "tertiary-container": "#ff8eac",
              "error": "#b41340",
              "surface": "#f4f6ff",
              "on-primary-fixed": "#000000",
              "on-surface": "#242f41",
              "on-primary": "#f8f0ff",
              "surface-container-highest": "#cdddfe",
              "on-tertiary-fixed-variant": "#711036",
              "primary-fixed-dim": "#a67aff",
              "on-tertiary-fixed": "#380016",
              "on-error": "#ffefef",
              "surface-dim": "#c3d5f8",
              "on-secondary-fixed-variant": "#60586b",
              "surface-container": "#dee8ff",
              "inverse-primary": "#a476ff",
              "on-tertiary": "#ffeff1",
              "tertiary-dim": "#8e294c",
              "primary": "#702ae1",
              "on-error-container": "#510017",
              "on-primary-fixed-variant": "#390083",
              "background": "#f4f6ff",
              "on-surface-variant": "#515c70",
              "secondary-dim": "#534c5f",
              "on-secondary-fixed": "#433c4e",
              "on-secondary-container": "#564f61",
              "on-secondary": "#f8efff",
              "surface-container-lowest": "#ffffff",
              "error-container": "#f74b6d"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Be Vietnam Pro"],
              "label": ["Be Vietnam Pro"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body {
        background-color: #f4f6ff;
        color: #242f41;
        font-family: 'Be Vietnam Pro', sans-serif;
      }
      .signature-gradient {
        background: linear-gradient(135deg, #702ae1 0%, #6411d5 100%);
      }
      .glass-header {
        background: rgba(244, 246, 255, 0.8);
        backdrop-filter: blur(20px);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col items-center overflow-x-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 glass-header">
<div class="flex items-center justify-between px-6 h-16 w-full max-w-md mx-auto rtl">
<div class="flex items-center gap-4">
<button class="p-2 hover:bg-[#ecf1ff] transition-colors active:scale-95 duration-200 rounded-full">
<span class="material-symbols-outlined text-[#7C3AED] text-2xl" data-icon="arrow_forward">arrow_forward</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold text-lg tracking-tight text-[#242f41]">ההזמנות שלי</h1>
</div>
<div class="w-10 h-10 flex items-center justify-center">
<!-- Placeholder for profile or action -->
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-md mx-auto pt-24 pb-32 px-8 flex flex-col items-center justify-center text-center">
<!-- Premium Empty State Illustration Area -->
<div class="relative mb-12">
<!-- Atmospheric Depth Layers -->
<div class="absolute inset-0 bg-primary-container/10 rounded-full blur-3xl transform scale-150"></div>
<div class="relative w-64 h-64 flex items-center justify-center">
<!-- Outer Ring -->
<div class="absolute inset-0 border-2 border-dashed border-primary/20 rounded-full"></div>
<!-- Main Illustration Circle -->
<div class="w-48 h-48 bg-surface-container-lowest rounded-full shadow-[0_20px_50px_rgba(36,47,65,0.08)] flex items-center justify-center relative z-10">
<div class="w-32 h-32 bg-secondary-container rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-[#7C3AED] text-6xl opacity-80" data-icon="history">history</span>
</div>
<!-- Floating Accent Icons -->
<div class="absolute -top-4 -right-2 w-12 h-12 bg-white rounded-full shadow-lg flex items-center justify-center transform rotate-12">
<span class="material-symbols-outlined text-primary-dim text-2xl" data-icon="calendar_today">calendar_today</span>
</div>
<div class="absolute bottom-4 -left-6 w-14 h-14 bg-surface-container-high rounded-2xl shadow-md flex items-center justify-center transform -rotate-12">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
</div>
</div>
<!-- Text Content -->
<div class="space-y-4 max-w-xs">
<h2 class="font-headline font-extrabold text-2xl text-on-surface tracking-tight leading-tight">
                עדיין אין הזמנות שהושלמו
            </h2>
<p class="font-body text-on-surface-variant leading-relaxed text-lg">
                כאן יופיעו כל המפגשים והמשמרות שבוצעו בהצלחה דרך האפליקציה.
            </p>
</div>
<!-- Action Area -->
<div class="w-full mt-12 flex flex-col gap-4">
<button class="signature-gradient text-on-primary py-4 px-8 rounded-lg font-bold text-lg shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="search">search</span>
                מעבר לחיפוש
            </button>
<button class="bg-secondary-container text-on-secondary-container py-4 px-8 rounded-lg font-semibold text-lg active:scale-[0.98] transition-all hover:bg-surface-container-highest flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="work_outline">work_outline</span>
                צפייה בלוח עבודות
            </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full rounded-t-[2rem] z-50 bg-white/90 backdrop-blur-lg shadow-[0_-8px_30px_rgb(36,47,65,0.06)] border-t border-[#a2adc4]/15">
<div class="flex justify-around items-center h-20 px-4 pb-safe w-full max-w-md mx-auto rtl">
<!-- Search -->
<div class="flex flex-col items-center justify-center text-[#a2adc4] hover:text-[#7C3AED] transition-all active:scale-90 tap-highlight-transparent cursor-pointer">
<span class="material-symbols-outlined mb-1" data-icon="search">search</span>
<span class="font-['Be_Vietnam_Pro'] text-[12px] font-medium leading-relaxed">חיפוש</span>
</div>
<!-- Bookings (Active) -->
<div class="flex flex-col items-center justify-center text-[#702ae1] font-bold scale-110 transition-transform tap-highlight-transparent cursor-pointer">
<span class="material-symbols-outlined mb-1" data-icon="calendar_month" style="font-variation-settings: 'FILL' 1;">calendar_month</span>
<span class="font-['Be_Vietnam_Pro'] text-[12px] font-medium leading-relaxed">הזמנות</span>
</div>
<!-- Messages -->
<div class="flex flex-col items-center justify-center text-[#a2adc4] hover:text-[#7C3AED] transition-all active:scale-90 tap-highlight-transparent cursor-pointer">
<span class="material-symbols-outlined mb-1" data-icon="chat_bubble">chat_bubble</span>
<span class="font-['Be_Vietnam_Pro'] text-[12px] font-medium leading-relaxed">הודעות</span>
</div>
<!-- Profile -->
<div class="flex flex-col items-center justify-center text-[#a2adc4] hover:text-[#7C3AED] transition-all active:scale-90 tap-highlight-transparent cursor-pointer">
<span class="material-symbols-outlined mb-1" data-icon="person">person</span>
<span class="font-['Be_Vietnam_Pro'] text-[12px] font-medium leading-relaxed">פרופיל</span>
</div>
</div>
</nav>
<!-- Hidden Images for Data-Alt compliance as specified for empty state visuals -->
<div class="hidden">
<div data-alt="Soft purple abstract illustration for empty booking state"></div>
<div data-alt="Light lavender gradient background pattern for serenity"></div>
</div>
</body></html>
