<!DOCTYPE html>

<html dir="rtl" lang="he"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .font-plus-jakarta { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-be-vietnam { font-family: 'Be Vietnam Pro', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-container": "#b28cff",
              "on-background": "#242f41",
              "surface-container-high": "#d5e3ff",
              "on-tertiary-container": "#64042d",
              "outline-variant": "#a2adc4",
              "on-primary-container": "#2e006c",
              "inverse-on-surface": "#929db4",
              "secondary": "#60586b",
              "inverse-surface": "#040e1f",
              "surface-bright": "#f4f6ff",
              "primary-dim": "#6411d5",
              "secondary-container": "#e9def5",
              "surface-container-low": "#ecf1ff",
              "surface-variant": "#cdddfe",
              "surface-tint": "#702ae1",
              "secondary-fixed": "#e9def5",
              "secondary-fixed-dim": "#dbd0e7",
              "tertiary-fixed-dim": "#f77c9e",
              "outline": "#6c778c",
              "primary-fixed": "#b28cff",
              "tertiary-fixed": "#ff8eac",
              "tertiary-container": "#ff8eac",
              "tertiary": "#9e3657",
              "error-dim": "#a70138",
              "on-tertiary-fixed": "#380016",
              "on-primary": "#f8f0ff",
              "primary-fixed-dim": "#a67aff",
              "surface-container-highest": "#cdddfe",
              "on-tertiary-fixed-variant": "#711036",
              "on-primary-fixed": "#000000",
              "surface": "#f4f6ff",
              "on-surface": "#242f41",
              "error": "#b41340",
              "tertiary-dim": "#8e294c",
              "surface-container": "#dee8ff",
              "inverse-primary": "#a476ff",
              "on-tertiary": "#ffeff1",
              "on-error": "#ffefef",
              "surface-dim": "#c3d5f8",
              "on-secondary-fixed-variant": "#60586b",
              "on-primary-fixed-variant": "#390083",
              "background": "#f4f6ff",
              "on-surface-variant": "#515c70",
              "on-error-container": "#510017",
              "primary": "#702ae1",
              "error-container": "#f74b6d",
              "on-secondary-container": "#564f61",
              "on-secondary": "#f8efff",
              "surface-container-lowest": "#ffffff",
              "on-secondary-fixed": "#433c4e",
              "secondary-dim": "#534c5f"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Be Vietnam Pro"],
              "label": ["Be Vietnam Pro"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background font-body text-on-surface min-h-screen">
<!-- TopAppBar -->
<header class="bg-[#f4f6ff]/80 dark:bg-[#1a1c1e]/80 backdrop-blur-xl fixed top-0 w-full z-50">
<div class="flex flex-row-reverse items-center justify-between px-6 h-16 w-full">
<div class="text-[#7C3AED] dark:text-[#d5bdfc] font-black text-xl font-plus-jakarta tracking-tight">Smartaf</div>
<button class="text-[#242f41] dark:text-[#e2e2e6] hover:bg-[#ecf1ff] transition-colors p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</header>
<main class="pt-24 pb-12 px-6 flex flex-col items-center max-w-2xl mx-auto">
<!-- Progress Indicator -->
<div class="w-full flex justify-center gap-2 mb-8">
<div class="h-1.5 w-12 rounded-full bg-primary-container/30"></div>
<div class="h-1.5 w-12 rounded-full bg-primary"></div>
<div class="h-1.5 w-12 rounded-full bg-surface-container"></div>
</div>
<!-- Header Section -->
<section class="text-right w-full mb-10">
<h1 class="text-3xl font-bold font-headline text-on-surface mb-2 tracking-tight">ספרו לנו על המשפחה שלכם</h1>
<p class="text-on-surface-variant text-lg leading-relaxed">המידע יעזור לנו ב-Smartaf למצוא עבורכם את המטפלת המושלמת שמתאימה בדיוק לצרכים שלכם.</p>
</section>
<!-- Form Card -->
<div class="w-full bg-surface-container-lowest rounded-lg p-8 md:p-10 shadow-[0_8px_30px_rgb(36,47,65,0.04)]">
<form class="space-y-8">
<!-- Photo Upload Placeholder -->
<div class="flex flex-col items-center gap-4 mb-10">
<div class="relative group cursor-pointer">
<div class="w-32 h-32 rounded-full bg-surface-container-high flex items-center justify-center border-4 border-surface-container-lowest overflow-hidden transition-all group-hover:bg-surface-variant">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="add_a_photo">add_a_photo</span>
</div>
<div class="absolute bottom-0 left-0 bg-primary text-on-primary p-2 rounded-full shadow-lg border-2 border-surface-container-lowest">
<span class="material-symbols-outlined text-sm" data-icon="edit">edit</span>
</div>
</div>
<span class="text-on-surface-variant font-medium text-sm">הוסיפו תמונה משפחתית (אופציונלי)</span>
</div>
<!-- Input Group: Family Name -->
<div class="space-y-3">
<label class="block text-on-surface font-semibold text-sm pr-1" for="family_name">שם המשפחה</label>
<input class="w-full h-14 px-6 bg-surface-container-high border-none rounded-[1.5rem] focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary transition-all text-on-surface placeholder:text-outline" id="family_name" placeholder="לדוגמה: משפחת כהן" type="text"/>
</div>
<!-- Input Group: Family Bio -->
<div class="space-y-3">
<label class="block text-on-surface font-semibold text-sm pr-1" for="family_bio">קצת עליכם ועל הצרכים שלכם</label>
<textarea class="w-full px-6 py-4 bg-surface-container-high border-none rounded-[1.5rem] focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary transition-all text-on-surface placeholder:text-outline resize-none" id="family_bio" placeholder="ספרו לנו על הילדים, השעות המועדפות וכל דבר אחר שחשוב שהמטפלת תדע..." rows="5"></textarea>
</div>
<!-- Input Group: Preferences Chips -->
<div class="space-y-4">
<label class="block text-on-surface font-semibold text-sm pr-1">מה הכי חשוב לכם?</label>
<div class="flex flex-wrap gap-2">
<button class="px-5 py-2.5 rounded-full bg-secondary-container text-on-secondary-container font-medium text-sm hover:opacity-90 transition-opacity" type="button">ניסיון עם תינוקות</button>
<button class="px-5 py-2.5 rounded-full bg-surface-container text-on-surface-variant font-medium text-sm hover:bg-surface-variant transition-colors" type="button">עזרה בשיעורי בית</button>
<button class="px-5 py-2.5 rounded-full bg-surface-container text-on-surface-variant font-medium text-sm hover:bg-surface-variant transition-colors" type="button">ניידות עם רכב</button>
<button class="px-5 py-2.5 rounded-full bg-surface-container text-on-surface-variant font-medium text-sm hover:bg-surface-variant transition-colors" type="button">שפות נוספות</button>
</div>
</div>
<!-- Primary Action -->
<div class="pt-6">
<button class="w-full h-16 rounded-full bg-gradient-to-br from-primary to-primary-dim text-on-primary font-bold text-lg shadow-[0_12px_24px_-8px_rgba(112,42,225,0.4)] hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                    המשך
                    <span class="material-symbols-outlined" data-icon="chevron_left">chevron_left</span>
</button>
<button class="w-full mt-4 h-12 text-outline font-medium text-sm hover:text-on-surface transition-colors" type="button">
                    דלג לשלב הבא
                </button>
</div>
</form>
</div>
<!-- Trust Indicator -->
<div class="mt-10 flex items-center gap-3 text-on-surface-variant/60">
<span class="material-symbols-outlined text-lg" data-icon="lock" data-weight="fill" style="font-variation-settings: 'FILL' 1;">lock</span>
<span class="text-sm font-medium">ב-Smartaf המידע שלך מאובטח ויוצג רק למטפלות מאושרות</span>
</div>
</main>
<!-- Background Decoration -->
<div class="fixed top-[-10%] left-[-5%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[100px] -z-10"></div>
<div class="fixed bottom-[-10%] right-[-5%] w-[50%] h-[50%] bg-surface-container-high/40 rounded-full blur-[100px] -z-10"></div>
</body></html>
