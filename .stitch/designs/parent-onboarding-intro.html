</button>
</div>
</div>
</header>

<div class="relative w-full mb-14">

<div class="absolute -top-10 -right-10 w-40 h-40 bg-primary/10 rounded-full blur-3xl -z-10"></div>

<div class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center text-white shadow-badge-premium shrink-0">
<span class="material-symbols-outlined text-fill-1">favorite</span>
</div>
<div class="flex flex-col text-right">
<span class="font-bold text-slate-900 text-base leading-tight">בביטחון מלא</span>
<span class="text-xs text-slate-500 font-medium">הכי טוב לילדים שלך</span>
</div>
</div>
</div>
</div>
<!-- Content Area -->
<div class="text-center w-full space-y-6">
<div class="space-y-3">
<h1 class="text-4xl font-extrabold tracking-tight text-slate-900 leading-tight">
                ברוכים הבאים ל-<span class="text-primary">Smartaf</span>
</h1>
<p class="text-lg text-slate-500 max-w-md mx-auto leading-relaxed font-normal">
                אנחנו כאן כדי לעזור לכם למצוא את המסגרת המושלמת לילדים שלכם, עם שקט נפשי וביטחון מלא.
            </p>
</div>

<div class="grid grid-cols-1 gap-4 mt-8">
<div class="bg-white p-5 rounded-2xl border border-slate-50 flex items-center gap-5 text-right shadow-soft-premium hover:shadow-hero-premium transition-all duration-300">

</div>

</button>
