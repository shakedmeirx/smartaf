<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .otp-input:focus {
            background-color: #ffffff !important;
            border-color: #702ae1 !important;
            box-shadow: 0 0 0 2px rgba(112, 42, 225, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex flex-col items-center">
<!-- Top AppBar (Supressed Shell for Transactional Focus) -->
<header class="fixed top-0 w-full z-50 bg-[#f4f6ff]/80 backdrop-blur-md flex flex-row-reverse justify-between items-center px-6 h-16">
<div class="font-headline font-black text-2xl text-on-background tracking-tight">Smartaf</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-on-surface">arrow_forward</span>
</button>
</header>
<!-- Main Canvas -->
<main class="flex-grow flex flex-col items-center justify-center w-full max-w-md px-6 pt-24 pb-12">
<!-- Hero Illustration/Icon -->
<div class="relative mb-10 w-32 h-32">
<div class="absolute inset-0 bg-primary/10 rounded-full blur-2xl"></div>
<div class="relative w-full h-full bg-surface-container-lowest rounded-full flex items-center justify-center shadow-[0_8px_32px_rgba(36,47,65,0.06)]">
<span class="material-symbols-outlined text-primary text-5xl" style="font-variation-settings: 'FILL' 1;">phonelink_lock</span>
</div>
</div>
<!-- Editorial Header Section -->
<div class="text-center w-full mb-12">
<h1 class="font-headline text-3xl font-extrabold tracking-tight text-on-background mb-4">אימות מספר הטלפון</h1>
<p class="font-body text-on-surface-variant text-lg leading-relaxed">אנא הזן את קוד האימות בן 6 הספרות ששלחנו לנייד שלך</p>
</div>
<!-- OTP Input Area -->
<div class="w-full space-y-10">
<div class="flex flex-row-reverse gap-3 justify-center" dir="ltr">
<!-- 6 Individual Digit Inputs -->
<input class="otp-input w-12 h-16 text-center text-2xl font-bold bg-white border border-outline-variant rounded-xl transition-all duration-200 outline-none focus:ring-2 focus:ring-primary focus:border-primary shadow-sm" maxlength="1" placeholder="·" type="text"/>
<input class="otp-input w-12 h-16 text-center text-2xl font-bold bg-white border border-outline-variant rounded-xl transition-all duration-200 outline-none focus:ring-2 focus:ring-primary focus:border-primary shadow-sm" maxlength="1" placeholder="·" type="text"/>
<input class="otp-input w-12 h-16 text-center text-2xl font-bold bg-white border border-outline-variant rounded-xl transition-all duration-200 outline-none focus:ring-2 focus:ring-primary focus:border-primary shadow-sm" maxlength="1" placeholder="·" type="text"/>
<input class="otp-input w-12 h-16 text-center text-2xl font-bold bg-white border border-outline-variant rounded-xl transition-all duration-200 outline-none focus:ring-2 focus:ring-primary focus:border-primary shadow-sm" maxlength="1" placeholder="·" type="text"/>
<input class="otp-input w-12 h-16 text-center text-2xl font-bold bg-white border border-outline-variant rounded-xl transition-all duration-200 outline-none focus:ring-2 focus:ring-primary focus:border-primary shadow-sm" maxlength="1" placeholder="·" type="text"/>
<input class="otp-input w-12 h-16 text-center text-2xl font-bold bg-white border border-outline-variant rounded-xl transition-all duration-200 outline-none focus:ring-2 focus:ring-primary focus:border-primary shadow-sm" maxlength="1" placeholder="·" type="text"/>
</div>
<!-- Resend Action -->
<div class="flex flex-col items-center gap-3">
<p class="text-on-surface-variant text-sm font-medium">לא קיבלת את הקוד?</p>
<button class="text-primary font-bold hover:underline underline-offset-4 decoration-2 transition-all active:scale-95">
                    שלח קוד חדש
                </button>
</div>
<!-- Primary Action -->
<div class="pt-4">
<button class="w-full bg-gradient-to-br from-primary to-primary-dim text-on-primary font-bold text-lg py-5 rounded-lg shadow-xl shadow-primary/20 active:scale-[0.98] transition-all duration-200">
                    אימות והמשך
                </button>
</div>
</div>
<!-- Support Info - Tonal Layering Card -->
<div class="mt-16 w-full p-6 bg-surface-container-low rounded-lg flex items-center gap-4">
<div class="bg-surface-container-lowest p-3 rounded-full shadow-sm">
<span class="material-symbols-outlined text-secondary text-xl">help</span>
</div>
<div class="flex flex-col text-right">
<span class="text-on-background font-semibold text-sm">זקוק לעזרה?</span>
<span class="text-on-surface-variant text-xs">שירות הלקוחות שלנו זמין עבורך 24/7</span>
</div>
</div>
</main>
<!-- Background Decorative Elements -->
<div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[100px] pointer-events-none -z-10"></div>
<div class="fixed bottom-[-5%] right-[-5%] w-[30%] h-[30%] bg-secondary-container/30 rounded-full blur-[80px] pointer-events-none -z-10"></div>
