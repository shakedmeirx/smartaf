<!DOCTYPE html>

<html dir="rtl" lang="he"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Be+Vietnam+Pro', sans-serif;
        }
        h1, h2, h3, .brand-font {
            font-family: 'Plus+Jakarta+Sans', sans-serif;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "inverse-on-surface": "#929db4",
                        "on-background": "#242f41",
                        "inverse-surface": "#040e1f",
                        "surface-container-high": "#d5e3ff",
                        "error-dim": "#a70138",
                        "inverse-primary": "#a476ff",
                        "surface-container-lowest": "#ffffff",
                        "outline-variant": "#a2adc4",
                        "error": "#b41340",
                        "secondary-dim": "#534c5f",
                        "on-primary": "#f8f0ff",
                        "on-secondary-fixed": "#433c4e",
                        "tertiary-fixed": "#ff8eac",
                        "on-secondary-fixed-variant": "#60586b",
                        "primary": "#702ae1",
                        "surface": "#f4f6ff",
                        "surface-dim": "#c3d5f8",
                        "on-primary-container": "#2e006c",
                        "on-tertiary-fixed": "#380016",
                        "on-primary-fixed": "#000000",
                        "surface-bright": "#f4f6ff",
                        "on-tertiary": "#ffeff1",
                        "surface-container-highest": "#cdddfe",
                        "secondary-fixed-dim": "#dbd0e7",
                        "primary-container": "#b28cff",
                        "on-primary-fixed-variant": "#390083",
                        "primary-fixed": "#b28cff",
                        "on-tertiary-container": "#64042d",
                        "on-error": "#ffefef",
                        "on-error-container": "#510017",
                        "surface-container": "#dee8ff",
                        "on-secondary": "#f8efff",
                        "on-secondary-container": "#564f61",
                        "surface-container-low": "#ecf1ff",
                        "on-tertiary-fixed-variant": "#711036",
                        "tertiary-container": "#ff8eac",
                        "on-surface-variant": "#515c70",
                        "tertiary-dim": "#8e294c",
                        "secondary-container": "#e9def5",
                        "primary-fixed-dim": "#a67aff",
                        "on-surface": "#242f41",
                        "secondary": "#60586b",
                        "primary-dim": "#6411d5",
                        "surface-variant": "#cdddfe",
                        "surface-tint": "#702ae1",
                        "tertiary-fixed-dim": "#f77c9e",
                        "background": "#f4f6ff",
                        "tertiary": "#9e3657",
                        "error-container": "#f74b6d",
                        "secondary-fixed": "#e9def5",
                        "outline": "#6c778c"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Be Vietnam Pro"],
                        "label": ["Be Vietnam Pro"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface min-h-screen selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#f4f6ff]/80 backdrop-blur-md">
<div class="flex flex-row-reverse justify-between items-center w-full px-6 h-16">
<div class="flex items-center gap-3">
<span class="text-2xl font-black text-[#242f41] brand-font">Smartaf</span>
</div>
<button class="text-[#242f41] hover:bg-[#ecf1ff]/50 p-2 rounded-full transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
</div>
</header>
<main class="pt-24 pb-12 px-6 max-w-2xl mx-auto flex flex-col items-center">
<!-- Editorial Header -->
<div class="w-full mb-10 text-right">
<h1 class="text-4xl font-extrabold text-on-background tracking-tight mb-3 font-display">איך תרצו להמשיך?</h1>
<p class="text-on-surface-variant text-lg leading-relaxed max-w-md">בחרו את מצב המשתמש שלכם כדי שנוכל להתאים לכם את החוויה המושלמת.</p>
</div>
<!-- Role Cards Grid -->
<div class="grid grid-cols-1 gap-6 w-full">
<!-- Parent Card -->
<label class="group relative cursor-pointer">
<input checked="" class="peer hidden" name="role" type="radio" value="parent"/>
<div class="bg-surface-container-lowest rounded-lg p-7 transition-all duration-300 ring-2 ring-transparent peer-checked:ring-primary shadow-sm hover:shadow-md peer-checked:shadow-xl border border-outline/10 flex flex-row items-center gap-6 overflow-hidden">
<div class="flex-shrink-0 w-20 h-20 rounded-full bg-secondary-container flex items-center justify-center text-primary relative overflow-visible">
<span class="material-symbols-outlined text-4xl" data-icon="child_care">child_care</span>
<!-- Asymmetrical Overlap Detail -->
<div class="absolute -top-1 -right-1 w-6 h-6 bg-tertiary-container rounded-full border-4 border-surface-container-lowest"></div>
</div>
<div class="flex-grow">
<h3 class="text-2xl font-bold text-on-surface mb-1">הורה</h3>
<p class="text-on-surface-variant text-base leading-snug">מחפש/ת את הבייביסיטר המושלם/ת לילדים שלי</p>
</div>
<div class="flex-shrink-0 text-primary opacity-0 peer-checked:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-3xl" data-icon="check_circle" data-weight="fill">check_circle</span>
</div>
<!-- Subtle Decorative Background Shape -->
<div class="absolute -bottom-6 -left-6 w-24 h-24 bg-surface-container-low rounded-full opacity-50 group-hover:scale-110 transition-transform duration-500"></div>
</div>
</label>
<!-- Babysitter Card -->
<label class="group relative cursor-pointer">
<input class="peer hidden" name="role" type="radio" value="sitter"/>
<div class="bg-surface-container-lowest rounded-lg p-7 transition-all duration-300 ring-2 ring-transparent peer-checked:ring-primary shadow-sm hover:shadow-md peer-checked:shadow-xl border border-outline/10 flex flex-row items-center gap-6 overflow-hidden">
<div class="flex-shrink-0 w-20 h-20 rounded-full bg-surface-container-high flex items-center justify-center text-on-surface-variant relative overflow-visible">
<span class="material-symbols-outlined text-4xl" data-icon="work">work</span>
</div>
<div class="flex-grow">
<h3 class="text-2xl font-bold text-on-surface mb-1">בייביסיטר</h3>
<p class="text-on-surface-variant text-base leading-snug">מחפש/ת עבודה ומעוניין/ת לנהל את המשמרות שלי</p>
</div>
<div class="flex-shrink-0 text-primary opacity-0 peer-checked:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-3xl" data-icon="check_circle" data-weight="fill">check_circle</span>
</div>
<!-- Subtle Decorative Background Shape -->
<div class="absolute -top-6 -left-6 w-24 h-24 bg-surface-container-low rounded-full opacity-50 group-hover:scale-110 transition-transform duration-500"></div>
</div>
</label>
</div>
<!-- Action Section -->
<div class="mt-12 w-full space-y-4">
<button class="w-full h-16 bg-gradient-to-br from-primary to-primary-dim text-on-primary rounded-md font-bold text-xl shadow-lg hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span>בואו נתחיל</span>
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<p class="text-center text-on-surface-variant text-sm font-medium">
                ניתן לשנות את סוג החשבון בכל עת דרך ההגדרות
            </p>
</div>
<!-- Editorial Visual Element -->
<div class="mt-16 relative w-full h-48 bg-surface-container-low rounded-lg overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-l from-transparent to-surface-container-high/30"></div>
<div class="absolute right-10 top-1/2 -translate-y-1/2 text-right">
<span class="block text-primary font-black text-4xl opacity-10 mb-2 brand-font">Smartaf</span>
<p class="text-on-surface-variant font-medium italic opacity-60">הביטחון שלך, השקט שלהם.</p>
</div>
<!-- Abstract decorative circles -->
<div class="absolute -left-10 -bottom-10 w-32 h-32 bg-primary/5 rounded-full"></div>
<div class="absolute left-10 -top-10 w-20 h-20 bg-tertiary-container/10 rounded-full"></div>
</div>
</main>
<!-- Navigation Drawer (Invisible by default, logical presence) -->
<div class="hidden">
<div class="fixed inset-y-0 right-0 z-[60] flex flex-col p-6 rtl bg-[#f4f6ff] h-full w-80 rounded-l-[2rem] shadow-xl">
<div class="flex flex-col items-end mb-8">
<div class="w-16 h-16 rounded-full bg-surface-variant mb-3 flex items-center justify-center">
<span class="material-symbols-outlined text-3xl">person</span>
</div>
<h4 class="text-xl font-bold text-[#242f41]">שלום, משתמש</h4>
<p class="text-on-surface-variant text-sm">הורה / בייביסיטר</p>
</div>
<nav class="space-y-2">
<div class="flex items-center justify-end gap-3 p-3 rounded-xl hover:bg-[#ecf1ff] cursor-pointer">
<span>החלף מצב משתמש</span>
<span class="material-symbols-outlined">sync_alt</span>
</div>
<div class="flex items-center justify-end gap-3 p-3 rounded-xl hover:bg-[#ecf1ff] cursor-pointer">
<span>הגדרות</span>
<span class="material-symbols-outlined">settings</span>
</div>
</nav>
</div>
</div>
</body></html>
