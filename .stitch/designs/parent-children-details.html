<!DOCTYPE html>

<html dir="rtl" lang="he"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "outline-variant": "#a2adc4",
              "on-primary-fixed": "#000000",
              "on-surface": "#242f41",
              "secondary-fixed": "#e9def5",
              "inverse-surface": "#040e1f",
              "inverse-primary": "#a476ff",
              "secondary-fixed-dim": "#dbd0e7",
              "surface-container-low": "#ecf1ff",
              "error-container": "#f74b6d",
              "outline": "#6c778c",
              "on-secondary": "#f8efff",
              "on-error": "#ffefef",
              "surface-bright": "#f4f6ff",
              "on-tertiary-fixed": "#380016",
              "surface-container": "#dee8ff",
              "surface": "#f4f6ff",
              "primary-dim": "#6411d5",
              "inverse-on-surface": "#929db4",
              "on-secondary-container": "#564f61",
              "on-surface-variant": "#515c70",
              "error": "#b41340",
              "secondary": "#60586b",
              "surface-container-lowest": "#ffffff",
              "surface-container-highest": "#cdddfe",
              "secondary-dim": "#534c5f",
              "primary-container": "#b28cff",
              "tertiary-fixed-dim": "#f77c9e",
              "on-primary-fixed-variant": "#390083",
              "on-background": "#242f41",
              "secondary-container": "#e9def5",
              "surface-tint": "#702ae1",
              "on-error-container": "#510017",
              "on-tertiary": "#ffeff1",
              "on-primary-container": "#2e006c",
              "surface-variant": "#cdddfe",
              "on-tertiary-container": "#64042d",
              "on-secondary-fixed": "#433c4e",
              "on-primary": "#f8f0ff",
              "surface-dim": "#c3d5f8",
              "tertiary-fixed": "#ff8eac",
              "on-tertiary-fixed-variant": "#711036",
              "error-dim": "#a70138",
              "tertiary-dim": "#8e294c",
              "tertiary-container": "#ff8eac",
              "primary-fixed-dim": "#a67aff",
              "primary": "#702ae1",
              "on-secondary-fixed-variant": "#60586b",
              "surface-container-high": "#d5e3ff",
              "tertiary": "#9e3657",
              "primary-fixed": "#b28cff",
              "background": "#f4f6ff"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Be Vietnam Pro"],
              "label": ["Be Vietnam Pro"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        vertical-align: middle;
      }
      .primary-gradient {
        background: linear-gradient(135deg, #702ae1 0%, #6411d5 100%);
      }
      .glass-header {
        backdrop-filter: blur(20px);
      }
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#f4f6ff]/80 dark:bg-slate-900/80 backdrop-blur-xl flex flex-row-reverse justify-between items-center px-6 py-4">
<div class="flex items-center gap-2">
<span class="text-2xl font-black text-[#702ae1] dark:text-[#a67aff] font-headline tracking-tight">Smartaf</span>
</div>
<div class="flex items-center gap-4">
<button class="text-[#702ae1] dark:text-[#a67aff] font-headline font-bold tracking-tight hover:opacity-80 transition-opacity active:scale-95 duration-200">
                עזרה
            </button>
<span class="material-symbols-outlined text-[#702ae1] dark:text-[#a67aff]">arrow_forward</span>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-2xl mx-auto">
<!-- Progress Indicator -->
<div class="flex justify-center mb-10 gap-2">
<div class="h-1.5 w-12 rounded-full bg-primary/20"></div>
<div class="h-1.5 w-12 rounded-full primary-gradient"></div>
<div class="h-1.5 w-12 rounded-full bg-primary/20"></div>
</div>
<!-- Hero Section -->
<section class="mb-12 text-right">
<h1 class="text-4xl font-headline font-extrabold tracking-tight text-on-surface mb-4">ספרו לנו על הילדים</h1>
<p class="text-on-surface-variant text-lg leading-relaxed max-w-md ml-auto">
                המידע יעזור ל-Smartaf להתאים לכם את המטפלים הטובים ביותר לצרכים האישיים של המשפחה שלכם.
            </p>
</section>
<!-- Child Detail Card -->
<div class="space-y-8">
<div class="bg-surface-container-lowest rounded-lg p-8 shadow-[0_-8px_30px_rgb(36,47,65,0.03)] relative overflow-visible">
<!-- Decorative Avatar Placeholder -->
<div class="absolute -top-6 -right-4 w-20 h-20 rounded-full bg-secondary-container flex items-center justify-center border-4 border-surface shadow-sm overflow-hidden">
<img alt="תמונת ילד" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA7JoQg8rU89L6fmSsbxLR90iA4ElUL43NOQwP4pjgbOhVcY3rlDET_LawuGBoiYkLC21wY5ghf0eNrJuZaXiYTJCvd8fGQy8cm537WKmjq8JmkYrhlGPqTXLYSOxgHBsz1V3uLgZ-GZPNgfS8bqtJT3Lh66X5XwL0sWmYGNaBwSn3oo5UActeKirOssJopmWCEvWw1Vpc-MttDX57S_URixLWa02FgSOJ2RWUdZ4K_wN9v65ITI1s6rEK6LXcH-ReOgkYMNgim45Xs"/>
</div>
<div class="pt-4 space-y-8">
<!-- Name Input -->
<div class="space-y-3">
<label class="block text-sm font-bold text-on-surface-variant mr-1">שם הילד/ה</label>
<input class="w-full bg-surface-container-high border-none rounded-lg px-6 py-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all outline-none" placeholder="לדוגמה: אורי" type="text"/>
</div>
<!-- Age Selector -->
<div class="space-y-4">
<label class="block text-sm font-bold text-on-surface-variant mr-1">גיל</label>
<div class="flex flex-wrap gap-3">
<button class="px-5 py-2.5 rounded-full bg-secondary-container text-on-secondary-container font-medium text-sm transition-all active:scale-95">0-12 חודשים</button>
<button class="px-5 py-2.5 rounded-full bg-surface-container-high text-on-surface-variant font-medium text-sm hover:bg-surface-container hover:text-on-surface transition-all active:scale-95">1-2 שנים</button>
<button class="px-5 py-2.5 rounded-full bg-surface-container-high text-on-surface-variant font-medium text-sm hover:bg-surface-container hover:text-on-surface transition-all active:scale-95">2-4 שנים</button>
<button class="px-5 py-2.5 rounded-full bg-surface-container-high text-on-surface-variant font-medium text-sm hover:bg-surface-container hover:text-on-surface transition-all active:scale-95">4+ שנים</button>
</div>
</div>
<!-- Special Notes -->
<div class="space-y-3">
<label class="block text-sm font-bold text-on-surface-variant mr-1">הערות מיוחדות</label>
<textarea class="w-full bg-surface-container-high border-none rounded-lg px-6 py-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all outline-none resize-none" placeholder="רגישויות, העדפות או דברים שחשוב שהמטפלת תדע..." rows="3"></textarea>
</div>
</div>
</div>
<!-- Add Child Button (Ghost Style) -->
<button class="w-full py-6 rounded-lg border-2 border-dashed border-outline-variant/30 flex items-center justify-center gap-3 text-primary font-bold hover:bg-surface-container-low transition-colors group">
<span class="material-symbols-outlined text-2xl group-hover:scale-110 transition-transform">add_circle</span>
<span>הוספת ילד נוסף</span>
</button>
</div>
<!-- Primary Action -->
<div class="mt-16 flex flex-col items-center">
<button class="w-full primary-gradient text-on-primary py-5 rounded-md text-lg font-bold shadow-lg shadow-primary/20 active:scale-[0.98] transition-all">
                המשך
            </button>
<button class="mt-6 text-on-surface-variant font-medium text-sm hover:underline">
                אפשר להוסיף פרטים מאוחר יותר
            </button>
</div>
</main>
<!-- Decorative Elements (Asymmetry) -->
<div class="fixed -bottom-24 -left-24 w-64 h-64 rounded-full bg-primary/5 blur-3xl -z-10"></div>
<div class="fixed top-40 -right-20 w-80 h-80 rounded-full bg-tertiary/5 blur-3xl -z-10"></div>
</body></html>
