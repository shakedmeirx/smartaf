<!DOCTYPE html>

<html dir="rtl" lang="he"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@400;500;600;700&amp;family=Noto+Sans+Hebrew:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#7C3AED",
              "primary-dark": "#6D28D9",
              "surface": "#FDFDFF",
              "surface-card": "#FFFFFF",
              "on-surface": "#1A1C1E",
              "on-surface-variant": "#44474E",
              "outline": "#E1E2EC",
              "accent": "#F3E8FF"
            },
            fontFamily: {
              "headline": ["Noto Sans Hebrew", "Plus Jakarta Sans", "sans-serif"],
              "body": ["Noto Sans Hebrew", "Be Vietnam Pro", "sans-serif"],
            },
            borderRadius: {
              "DEFAULT": "1.25rem",
              "lg": "1.75rem",
              "xl": "2.5rem",
              "full": "9999px"
            },
            boxShadow: {
              'soft': '0 4px 24px -2px rgba(0, 0, 0, 0.04)',
              'premium': '0 12px 48px -12px rgba(124, 58, 237, 0.12)',
              'button': '0 8px 20px -4px rgba(124, 58, 237, 0.3)',
            },
            backgroundImage: {
                'primary-gradient': 'linear-gradient(135deg, #8B5CF6 0%, #6D28D9 100%)',
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #FDFDFF;
            font-family: 'Noto Sans Hebrew', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        input:focus, textarea:focus {
            box-shadow: 0 0 0 2px rgba(124, 58, 237, 0.15);
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-surface text-on-surface">
<!-- TopAppBar -->
<header class="sticky top-0 w-full z-50 bg-white/80 backdrop-blur-xl border-b border-outline/30">
<div class="flex flex-row-reverse justify-between items-center px-6 h-16 w-full max-w-2xl mx-auto">
<div class="flex items-center gap-3">
<h1 class="text-lg font-bold text-on-surface font-headline tracking-tight">עדכון פרופיל</h1>
<div class="h-4 w-[1px] bg-outline mx-1"></div>
<div class="flex items-center gap-1.5">
<div class="w-6 h-6 bg-primary-gradient rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-[14px] text-white" style="font-variation-settings: 'FILL' 1">smart_toy</span>
</div>
<span class="font-headline font-bold text-sm tracking-tight text-primary">Smartaf</span>
</div>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-gray-100/50 active:scale-95 duration-200">
<span class="material-symbols-outlined text-primary" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</header>
<main class="max-w-2xl mx-auto px-6 pt-8 pb-32">
<!-- Profile Image Section -->
<section class="flex flex-col items-center mb-10">
<div class="relative">
<div class="w-32 h-32 rounded-full overflow-hidden p-1 bg-white shadow-premium border border-outline/20">
<img alt="Profile Picture" class="w-full h-full rounded-full object-cover" data-alt="Close up portrait of a smiling woman in a garden" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCBxMEXmSJDNnz61lw6jIYjeB_KG5sjiVGHV3RQms6N_WT8Y1ivMvbBRjMUWZ8-EzPMJfwk1TNHQvPZmvnIgQmqojrAD5hokILOEFCQ2VJix9R5w9Q5ueY0-YyN_RLRNRIL5RuZY_dOggQADkCClKEenUxBigpqZjnk6ZS9QlibO-dacAH6smH6uvQflArWrSVtnBJYfsOGRQW2sT55eJH-5bUZrRzF4S_OeDTw35jUKrcdSFXaZ4Dss5RD9ewR307CMB3teRMZ5byi"/>
</div>
<button class="absolute bottom-0 left-0 bg-primary-gradient text-white w-10 h-10 rounded-full flex items-center justify-center shadow-button ring-4 ring-white active:scale-90 transition-transform">
<span class="material-symbols-outlined text-xl" data-icon="photo_camera" style="font-variation-settings: 'FILL' 0">photo_camera</span>
</button>
</div>
<h2 class="mt-5 font-headline text-2xl font-extrabold text-on-surface tracking-tight">הילה כהן</h2>
<p class="text-on-surface-variant text-sm mt-1 font-medium">ניהול העדפות המשפחה שלך</p>
</section>
<!-- Form Sections -->
<div class="space-y-6">
<!-- Personal Information -->
<section class="bg-surface-card p-6 rounded-xl shadow-soft border border-outline/30">
<div class="flex items-center gap-3 mb-6">
<div class="w-10 h-10 rounded-2xl bg-accent flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-2xl" data-icon="person_edit" style="font-variation-settings: 'FILL' 0">person_edit</span>
</div>
<h3 class="font-headline text-lg font-bold">פרטים אישיים</h3>
</div>
<div class="space-y-5">
<div class="flex flex-col gap-1.5">
<label class="text-[13px] font-bold text-on-surface-variant/80 px-1">שם מלא</label>
<input class="w-full bg-surface border border-outline/50 rounded-2xl px-5 py-3.5 focus:bg-white focus:border-primary/40 transition-all outline-none text-on-surface font-medium" type="text" value="הילה כהן"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-[13px] font-bold text-on-surface-variant/80 px-1">עיר מגורים</label>
<div class="relative">
<input class="w-full bg-surface border border-outline/50 rounded-2xl px-5 py-3.5 focus:bg-white focus:border-primary/40 transition-all outline-none text-on-surface font-medium" type="text" value="תל אביב - יפו"/>
<span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-primary/50 text-xl" data-icon="location_on">location_on</span>
</div>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-[13px] font-bold text-on-surface-variant/80 px-1">תיאור המשפחה</label>
<textarea class="w-full bg-surface border border-outline/50 rounded-2xl px-5 py-3.5 focus:bg-white focus:border-primary/40 transition-all outline-none text-on-surface font-medium resize-none leading-relaxed" rows="4">אנחנו משפחה צעירה ותוססת מתל אביב, אוהבים לטייל בים ולבלות בגינה. מחפשים בייביסיטר אחראית ואוהבת שתהיה חלק מהיומיום שלנו.</textarea>
</div>
</div>
</section>
<!-- Children Details -->
<section class="bg-surface-card p-6 rounded-xl shadow-soft border border-outline/30">
<div class="flex justify-between items-center mb-6">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-2xl bg-accent flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-2xl" data-icon="child_care">child_care</span>
</div>
<h3 class="font-headline text-lg font-bold">פרטי הילדים</h3>
</div>
<button class="bg-accent text-primary px-4 py-2 rounded-full text-sm font-bold active:scale-95 transition-all hover:bg-primary/10">
                        + הוספה
                    </button>
</div>
<div class="grid grid-cols-1 gap-3">
<!-- Child Item 1 -->
<div class="flex items-center gap-4 bg-surface p-4 rounded-2xl border border-outline/20 hover:border-primary/20 transition-colors group">
<div class="w-11 h-11 rounded-full bg-white shadow-sm flex items-center justify-center text-primary border border-outline/30">
<span class="material-symbols-outlined text-2xl" data-icon="face">face</span>
</div>
<div class="flex-1">
<p class="font-bold text-on-surface text-sm">איתי</p>
<p class="text-xs text-on-surface-variant font-medium">בן 4 שנים</p>
</div>
<button class="w-9 h-9 rounded-full bg-white border border-outline/30 text-on-surface-variant hover:text-primary hover:border-primary/30 transition-all">
<span class="material-symbols-outlined text-lg" data-icon="edit">edit</span>
</button>
</div>
<!-- Child Item 2 -->
<div class="flex items-center gap-4 bg-surface p-4 rounded-2xl border border-outline/20 hover:border-primary/20 transition-colors group">
<div class="w-11 h-11 rounded-full bg-white shadow-sm flex items-center justify-center text-pink-500 border border-outline/30">
<span class="material-symbols-outlined text-2xl" data-icon="face_3">face_3</span>
</div>
<div class="flex-1">
<p class="font-bold text-on-surface text-sm">מאיה</p>
<p class="text-xs text-on-surface-variant font-medium">בת שנתיים</p>
</div>
<button class="w-9 h-9 rounded-full bg-white border border-outline/30 text-on-surface-variant hover:text-primary hover:border-primary/30 transition-all">
<span class="material-symbols-outlined text-lg" data-icon="edit">edit</span>
</button>
</div>
</div>
</section>
<!-- Pets -->
<section class="bg-surface-card p-6 rounded-xl shadow-soft border border-outline/30">
<div class="flex items-center gap-3 mb-6">
<div class="w-10 h-10 rounded-2xl bg-accent flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-2xl" data-icon="pets">pets</span>
</div>
<h3 class="font-headline text-lg font-bold">חיות מחמד</h3>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-[13px] font-bold text-on-surface-variant/80 px-1">האם יש לכם חיות מחמד?</label>
<input class="w-full bg-surface border border-outline/50 rounded-2xl px-5 py-3.5 focus:bg-white focus:border-primary/40 transition-all outline-none text-on-surface font-medium" placeholder="למשל: כלב, חתול..." type="text" value="כלב גולדן רטריבר ידידותי בשם לוקה"/>
</div>
</section>
</div>
<!-- Sticky Save Button -->
<div class="fixed bottom-0 left-0 right-0 p-6 bg-white/70 backdrop-blur-lg border-t border-outline/20 z-40 flex justify-center">
<button class="w-full max-w-md bg-primary-gradient text-white py-4 rounded-2xl font-bold text-base shadow-button active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined font-bold" data-icon="check_circle" style="font-variation-settings: 'FILL' 1">check_circle</span>
                שמור שינויים
            </button>
</div>
</main>
</body></html>
