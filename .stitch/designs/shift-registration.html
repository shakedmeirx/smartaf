<!DOCTYPE html>

<html dir="rtl" lang="he"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background-color: #F8FAFC;
        }
        .headline {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7C3AED",
                        "primary-dark": "#6D28D9",
                        "surface": "#FFFFFF",
                        "background": "#F8FAFC",
                        "text-main": "#0F172A",
                        "text-muted": "#64748B",
                        "accent-pink": "#F472B6",
                        "accent-blue": "#3B82F6"
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "1.5rem",
                        "xl": "2rem",
                        "full": "9999px"
                    },
                    boxShadow: {
                        "premium": "0 10px 40px -10px rgba(124, 58, 237, 0.08)",
                        "inner-soft": "inset 0 2px 4px 0 rgba(0, 0, 0, 0.02)"
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-background text-text-main antialiased min-h-screen pb-28">
<!-- Top Bar -->
<header class="sticky top-0 w-full z-50 bg-white/80 backdrop-blur-md border-b border-slate-100 h-16 flex items-center justify-between px-6">
<div class="flex items-center gap-3">
<button class="flex items-center justify-center w-10 h-10 rounded-xl hover:bg-slate-100 transition-all text-primary">
<span class="material-symbols-outlined">arrow_forward</span>
</button>
<h1 class="text-lg headline font-bold text-text-main">רישום משמרת</h1>
</div>
<button class="text-primary headline font-bold px-4 py-2 hover:bg-primary/5 rounded-full transition-all">
            שמור
        </button>
</header>
<main class="pt-8 px-6 max-w-lg mx-auto">
<!-- Main Form Container -->
<div class="bg-white rounded-[2.5rem] p-8 shadow-premium border border-slate-50 relative">
<form class="space-y-8">
<!-- Family Picker -->
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-wider text-text-muted px-1">בחירת משפחה</label>
<div class="relative group">
<select class="w-full h-14 bg-slate-50 border-transparent rounded-2xl px-5 appearance-none text-sm font-semibold text-text-main focus:ring-2 focus:ring-primary/20 focus:border-primary focus:bg-white transition-all shadow-inner-soft">
<option selected="">משפחת לוי</option>
<option>משפחת כהן</option>
<option>משפחת ישראלי</option>
</select>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
</div>
</div>
<!-- Date Picker -->
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-wider text-text-muted px-1">תאריך המשמרת</label>
<div class="relative">
<input class="w-full h-14 bg-slate-50 border-transparent rounded-2xl px-5 text-sm font-semibold text-text-main focus:ring-2 focus:ring-primary/20 focus:border-primary focus:bg-white transition-all shadow-inner-soft" type="text" value="12/05/2024"/>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary/60">calendar_today</span>
</div>
</div>
<!-- Payment Toggle -->
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-wider text-text-muted px-1 text-right">סטטוס תשלום</label>
<div class="flex p-1.5 bg-slate-50 rounded-2xl gap-1">
<button class="flex-1 py-3 rounded-xl bg-white text-primary font-bold shadow-sm flex items-center justify-center gap-2 border border-slate-100" type="button">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                            שולם
                        </button>
<button class="flex-1 py-3 rounded-xl text-text-muted font-bold flex items-center justify-center gap-2 hover:bg-slate-100 transition-all" type="button">
                            טרם שולם
                        </button>
</div>
</div>
<!-- Time Card -->
<div class="bg-primary/5 rounded-3xl p-6 space-y-4 border border-primary/10">
<div class="flex items-center justify-between">
<h3 class="headline font-bold text-primary flex items-center gap-2 text-sm">
<span class="material-symbols-outlined text-sm">schedule</span>
                            זמני עבודה
                        </h3>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="space-y-1">
<label class="block text-[10px] font-bold text-primary/60 uppercase pr-1">שעת התחלה</label>
<input class="w-full h-12 bg-white border-transparent rounded-xl px-4 text-sm font-bold text-text-main focus:ring-2 focus:ring-primary/20 transition-all shadow-sm" type="time" value="17:00"/>
</div>
<div class="space-y-1">
<label class="block text-[10px] font-bold text-primary/60 uppercase pr-1">שעת סיום</label>
<input class="w-full h-12 bg-white border-transparent rounded-xl px-4 text-sm font-bold text-text-main focus:ring-2 focus:ring-primary/20 transition-all shadow-sm" type="time" value="21:00"/>
</div>
</div>
</div>
<!-- Rate & Summary -->
<div class="space-y-6">
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-wider text-text-muted px-1">תעריף לשעה</label>
<div class="relative">
<input class="w-full h-14 bg-slate-50 border-transparent rounded-2xl px-12 text-sm font-bold text-text-main focus:ring-2 focus:ring-primary/20 focus:border-primary focus:bg-white transition-all shadow-inner-soft" type="number" value="65"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 font-bold text-primary">₪</span>
</div>
</div>
<div class="bg-white border-2 border-dashed border-primary/30 rounded-2xl p-6 flex items-center justify-between">
<div class="space-y-0.5">
<span class="text-xs font-bold text-text-muted uppercase">סך הכל לתשלום</span>
<div class="headline font-extrabold text-3xl text-primary tracking-tight">₪260</div>
</div>
<div class="w-12 h-12 bg-primary/10 rounded-full flex items-center justify-center text-primary">
<span class="material-symbols-outlined">payments</span>
</div>
</div>
</div>
<!-- Notes -->
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-wider text-text-muted px-1">הערות וסיכום משמרת</label>
<textarea class="w-full bg-slate-50 border-transparent rounded-2xl p-5 text-sm font-medium text-text-main focus:ring-2 focus:ring-primary/20 focus:border-primary focus:bg-white transition-all resize-none shadow-inner-soft placeholder:text-slate-400" placeholder="איך עבר היום? משהו שחשוב שנדע?" rows="3"></textarea>
</div>
<!-- Save Button -->
<div class="pt-4">
<button class="w-full h-16 rounded-2xl bg-primary text-white headline font-bold text-md shadow-lg shadow-primary/25 flex items-center justify-center gap-3 active:scale-[0.97] transition-all hover:bg-primary-dark" type="button">
<span class="material-symbols-outlined">save</span>
                        שמור משמרת
                    </button>
</div>
</form>
</div>
<!-- Tip Card -->
<div class="mt-8 bg-slate-100 rounded-[2rem] p-6 flex items-start gap-4 border border-white">
<div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center flex-shrink-0 text-amber-400 shadow-sm">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">lightbulb</span>
</div>
<div>
<h4 class="font-bold text-text-main text-sm">טיפ מקצועי</h4>
<p class="text-[13px] text-text-muted mt-1 leading-relaxed">שיתוף פרטים קטנים על התנהלות הילדים בונה אמון ומערכת יחסים חזקה עם ההורים.</p>
</div>
</div>
</main>
<!-- Navigation -->
<nav class="fixed bottom-0 w-full z-50 bg-white/95 backdrop-blur-xl border-t border-slate-100 flex justify-around items-center h-20 px-4 pb-2">
<div class="flex flex-col items-center justify-center text-slate-400 px-5 py-2 group transition-colors cursor-pointer">
<span class="material-symbols-outlined mb-1 group-hover:text-primary">home</span>
<span class="text-[10px] font-bold uppercase tracking-widest group-hover:text-primary">ראשי</span>
</div>
<div class="flex flex-col items-center justify-center text-primary px-5 py-2 cursor-pointer relative">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">calendar_month</span>
<span class="text-[10px] font-bold uppercase tracking-widest">משמרות</span>
<div class="absolute -top-1 w-1 h-1 bg-primary rounded-full"></div>
</div>
<div class="flex flex-col items-center justify-center text-slate-400 px-5 py-2 group transition-colors cursor-pointer">
<span class="material-symbols-outlined mb-1 group-hover:text-primary">family_history</span>
<span class="text-[10px] font-bold uppercase tracking-widest group-hover:text-primary">משפחות</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-400 px-5 py-2 group transition-colors cursor-pointer">
<span class="material-symbols-outlined mb-1 group-hover:text-primary">person</span>
<span class="text-[10px] font-bold uppercase tracking-widest group-hover:text-primary">פרופיל</span>
</div>
</nav>
</body></html>
