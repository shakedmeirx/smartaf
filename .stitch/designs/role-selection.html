<!DOCTYPE html>

<html dir="rtl" lang="he"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Be+Vietnam+Pro', sans-serif;
        }
        h1, h2, h3, .brand-font {
            font-family: 'Plus+Jakarta+Sans', sans-serif;
        }
        .primary-gradient {
            background: linear-gradient(135deg, #702ae1 0%, #6411d5 100%);
        }
        .soft-shadow {
            box-shadow: 0 10px 30px -10px rgba(112, 42, 225, 0.15);
        }
        .card-active {
            box-shadow: 0 20px 40px -12px rgba(112, 42, 225, 0.2);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "inverse-on-surface": "#929db4",
                        "on-background": "#242f41",
                        "inverse-surface": "#040e1f",
                        "surface-container-high": "#d5e3ff",
                        "error-dim": "#a70138",
                        "inverse-primary": "#a476ff",
                        "surface-container-lowest": "#ffffff",
                        "outline-variant": "#a2adc4",
                        "error": "#b41340",
                        "secondary-dim": "#534c5f",
                        "on-primary": "#f8f0ff",
                        "on-secondary-fixed": "#433c4e",
                        "tertiary-fixed": "#ff8eac",
                        "on-secondary-fixed-variant": "#60586b",
                        "primary": "#702ae1",
                        "surface": "#f8faff",
                        "surface-dim": "#c3d5f8",
                        "on-primary-container": "#2e006c",
                        "on-tertiary-fixed": "#380016",
                        "on-primary-fixed": "#000000",
                        "surface-bright": "#f4f6ff",
                        "on-tertiary": "#ffeff1",
                        "surface-container-highest": "#cdddfe",
                        "secondary-fixed-dim": "#dbd0e7",
                        "primary-container": "#b28cff",
                        "on-primary-fixed-variant": "#390083",
                        "primary-fixed": "#b28cff",
                        "on-tertiary-container": "#64042d",
                        "on-error": "#ffefef",
                        "on-error-container": "#510017",
                        "surface-container": "#dee8ff",
                        "on-secondary": "#f8efff",
                        "on-secondary-container": "#564f61",
                        "surface-container-low": "#ecf1ff",
                        "on-tertiary-fixed-variant": "#711036",
                        "tertiary-container": "#ff8eac",
                        "on-surface-variant": "#515c70",
                        "tertiary-dim": "#8e294c",
                        "secondary-container": "#e9def5",
                        "primary-fixed-dim": "#a67aff",
                        "on-surface": "#242f41",
                        "secondary": "#60586b",
                        "primary-dim": "#6411d5",
                        "surface-variant": "#cdddfe",
                        "surface-tint": "#702ae1",
                        "tertiary-fixed-dim": "#f77c9e",
                        "background": "#f8faff",
                        "tertiary": "#9e3657",
                        "error-container": "#f74b6d",
                        "secondary-fixed": "#e9def5",
                        "outline": "#6c778c"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Be Vietnam Pro"],
                        "label": ["Be Vietnam Pro"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "1.5rem", "xl": "2rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-surface text-on-surface min-h-screen selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-md border-b border-surface-container-low">
<div class="flex flex-row-reverse justify-between items-center w-full px-6 h-16 max-w-2xl mx-auto">
<div class="flex items-center gap-2">
<span class="text-2xl font-extrabold text-primary brand-font tracking-tight">Smartaf</span>
</div>
<button class="text-on-surface-variant hover:bg-surface-container-low p-2 rounded-full transition-all active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
</div>
</header>
<main class="pt-24 pb-12 px-6 max-w-2xl mx-auto flex flex-col items-center">
<!-- Editorial Header -->
<div class="w-full mb-12 text-center md:text-right">
<h1 class="text-4xl font-extrabold text-on-background tracking-tight mb-4">איך תרצו להמשיך?</h1>
<p class="text-on-surface-variant text-lg leading-relaxed max-w-md mx-auto md:mr-0">בחרו את מצב המשתמש שלכם כדי שנוכל להתאים לכם את החוויה המושלמת.</p>
</div>
<!-- Role Cards Grid -->
<div class="grid grid-cols-1 gap-6 w-full">
<!-- Parent Card -->
<label class="group relative cursor-pointer">
<input checked="" class="peer hidden" name="role" type="radio" value="parent"/>
<div class="bg-surface-container-lowest rounded-xl p-8 transition-all duration-300 ring-2 ring-transparent peer-checked:ring-primary/40 soft-shadow peer-checked:card-active border-none flex flex-row items-center gap-6 overflow-hidden">
<div class="flex-shrink-0 w-20 h-20 rounded-full bg-secondary-container flex items-center justify-center text-primary relative z-10">
<span class="material-symbols-outlined text-4xl" data-icon="child_care">child_care</span>
<div class="absolute -top-1 -right-1 w-6 h-6 bg-tertiary-container rounded-full border-4 border-surface-container-lowest"></div>
</div>
<div class="flex-grow text-right">
<h3 class="text-2xl font-bold text-on-surface mb-1">הורה</h3>
<p class="text-on-surface-variant text-base leading-snug">מחפש/ת את הבייביסיטר המושלם/ת לילדים שלי</p>
</div>
<div class="flex-shrink-0 text-primary opacity-0 peer-checked:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-3xl" data-icon="check_circle" data-weight="fill">check_circle</span>
</div>
<!-- Decorative Element -->
<div class="absolute -bottom-10 -left-10 w-32 h-32 bg-primary/5 rounded-full group-hover:scale-110 transition-transform duration-700"></div>
</div>
</label>
<!-- Babysitter Card -->
<label class="group relative cursor-pointer">
<input class="peer hidden" name="role" type="radio" value="sitter"/>
<div class="bg-surface-container-lowest rounded-xl p-8 transition-all duration-300 ring-2 ring-transparent peer-checked:ring-primary/40 soft-shadow peer-checked:card-active border-none flex flex-row items-center gap-6 overflow-hidden">
<div class="flex-shrink-0 w-20 h-20 rounded-full bg-surface-container-high flex items-center justify-center text-on-surface-variant relative z-10">
<span class="material-symbols-outlined text-4xl" data-icon="work">work</span>
</div>
<div class="flex-grow text-right">
<h3 class="text-2xl font-bold text-on-surface mb-1">בייביסיטר</h3>
<p class="text-on-surface-variant text-base leading-snug">מחפש/ת עבודה ומעוניין/ת לנהל את המשמרות שלי</p>
</div>
<div class="flex-shrink-0 text-primary opacity-0 peer-checked:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-3xl" data-icon="check_circle" data-weight="fill">check_circle</span>
</div>
<!-- Decorative Element -->
<div class="absolute -top-10 -left-10 w-32 h-32 bg-secondary-container/20 rounded-full group-hover:scale-110 transition-transform duration-700"></div>
</div>
</label>
</div>
<!-- Action Section -->
<div class="mt-14 w-full space-y-5">
<button class="w-full h-16 primary-gradient text-on-primary rounded-xl font-bold text-xl shadow-lg hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-3">
<span>בואו נתחיל</span>
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<p class="text-center text-on-surface-variant text-sm font-medium opacity-80">
                ניתן לשנות את סוג החשבון בכל עת דרך ההגדרות
            </p>
</div>
<!-- Branding Visual Card -->
<div class="mt-20 relative w-full h-56 bg-surface-container-low rounded-xl overflow-hidden border border-surface-container-high/50">
<div class="absolute inset-0 bg-gradient-to-l from-transparent via-white/20 to-surface-container-high/40"></div>
<!-- Floating Orbs for "Airy" feel -->
<div class="absolute -left-12 -bottom-12 w-48 h-48 bg-primary/10 rounded-full blur-3xl"></div>
<div class="absolute right-0 top-0 w-32 h-32 bg-tertiary-container/15 rounded-full blur-2xl"></div>
<div class="absolute inset-0 flex flex-col items-center justify-center text-center p-8">
<span class="block text-primary/10 font-black text-6xl mb-1 brand-font select-none">Smartaf</span>
<p class="text-on-surface-variant font-semibold tracking-wide text-lg opacity-70">הביטחון שלך, השקט שלהם.</p>
<div class="mt-4 w-12 h-1.5 bg-primary/20 rounded-full"></div>
</div>
</div>
</main>
<!-- Sidebar/Drawer Placeholder (Matches Logic of Original) -->
<div class="hidden">
<div class="fixed inset-y-0 right-0 z-[60] flex flex-col p-6 rtl bg-surface h-full w-80 rounded-l-xl shadow-2xl border-l border-surface-container-high">
<div class="flex flex-col items-end mb-8">
<div class="w-16 h-16 rounded-full bg-surface-container-highest mb-4 flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-3xl">person</span>
</div>
<h4 class="text-xl font-bold text-on-background">שלום, משתמש</h4>
<p class="text-on-surface-variant text-sm">הגדרות חשבון</p>
</div>
<nav class="space-y-3">
<div class="flex items-center justify-end gap-3 p-4 rounded-xl hover:bg-surface-container-low cursor-pointer transition-colors">
<span class="font-medium">החלף מצב משתמש</span>
<span class="material-symbols-outlined text-on-surface-variant">sync_alt</span>
</div>
<div class="flex items-center justify-end gap-3 p-4 rounded-xl hover:bg-surface-container-low cursor-pointer transition-colors">
<span class="font-medium">הגדרות</span>
<span class="material-symbols-outlined text-on-surface-variant">settings</span>
</div>
</nav>
</div>
</div>
</body></html>
